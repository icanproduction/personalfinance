<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 20px;
    }
    h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
      color: #fff;
    }
    .subtitle {
      font-size: 11px;
      color: #64748b;
      margin-bottom: 16px;
    }
    .status {
      padding: 12px;
      border-radius: 8px;
      font-size: 12px;
      margin-bottom: 12px;
      background: #1e293b;
    }
    .status.success { background: #064e3b; color: #6ee7b7; }
    .status.error { background: #450a0a; color: #fca5a5; }
    .status.info { background: #1e293b; color: #94a3b8; }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 8px;
      transition: opacity 0.2s;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: #6366f1; color: white; }
    .btn-primary:hover:not(:disabled) { background: #4f46e5; }
    .settings {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #1e293b;
    }
    .settings label {
      font-size: 11px;
      color: #64748b;
      display: block;
      margin-bottom: 4px;
    }
    .settings input {
      width: 100%;
      padding: 8px;
      border: 1px solid #334155;
      border-radius: 6px;
      background: #1e293b;
      color: #e2e8f0;
      font-size: 12px;
      outline: none;
    }
    .settings input:focus { border-color: #6366f1; }
    .result { margin-top: 8px; font-size: 12px; }
    .result span { font-weight: 600; color: #818cf8; }
  </style>
</head>
<body>
  <h1>iCAN Financial Sync</h1>
  <p class="subtitle">Sync transaksi dari myBCA</p>

  <div id="statusBox" class="status info">
    Buka myBCA → Activity untuk mulai sync
  </div>

  <button id="syncBtn" class="btn-primary" disabled>
    Sync Sekarang
  </button>

  <div id="result" class="result" style="display: none;"></div>

  <div class="settings">
    <label>API URL</label>
    <input type="text" id="apiUrl" placeholder="https://ican-financial.vercel.app">
  </div>

  <script src="popup.js"></script>
</body>
</html>
